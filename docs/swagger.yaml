host: localhost:8080
info:
  contact: {}
  description: Enterprise gateway for Autonomi decentralized storage. Provides file
    upload/download, user management, API tokens, webhooks, and admin controls.
  title: Indelible API
  version: "2.0"
paths:
  /admin/analytics/costs:
    get:
      description: Return cost analytics broken down by token and department
      parameters:
      - description: Number of days to look back (default 7)
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get cost analytics
      tags:
      - 'Admin: Analytics'
  /admin/analytics/tokens:
    get:
      description: Return API token usage statistics for the specified time period
      parameters:
      - description: Number of days to look back (default 7)
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get token analytics
      tags:
      - 'Admin: Analytics'
  /admin/analytics/uploads:
    get:
      description: Return upload statistics for the specified time period
      parameters:
      - description: Number of days to look back (default 7)
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get upload analytics
      tags:
      - 'Admin: Analytics'
  /admin/departments:
    get:
      description: Return the distinct department labels in use across API tokens,
        for the quota dialog's department picker
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                type: string
              type: array
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List known departments
      tags:
      - 'Admin: Quotas'
  /admin/groups:
    get:
      description: Return all permission groups with member counts
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/internal_handlers.groupResponse'
              type: array
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all groups
      tags:
      - 'Admin: Groups'
    post:
      consumes:
      - application/json
      description: Create a new permission group with a specified permission level
      parameters:
      - description: Group details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.createGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_handlers.groupResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Group name taken
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a group
      tags:
      - 'Admin: Groups'
  /admin/groups/{id}:
    delete:
      description: Remove a permission group and all its memberships
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a group
      tags:
      - 'Admin: Groups'
    put:
      consumes:
      - application/json
      description: Update a group's name, description, permission level, or active
        status
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated group fields
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.updateGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.groupResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a group
      tags:
      - 'Admin: Groups'
  /admin/groups/{id}/members:
    get:
      description: Return the resolved members of a group (id, email, display name).
        V2-304.
      parameters:
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/internal_handlers.groupMemberResponse'
