name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Dry-run version for docker image tags (e.g. 0.0.0-dryrun-1). Only :<version> is pushed; :latest is reserved for real tag releases. Bump the suffix between runs — duplicate values silently overwrite the prior dry-run tag."
        required: true
        default: "REPLACE-ME"
      antd_version:
        description: "ant-sdk release tag to bundle (e.g. v0.2.0). Leave empty to read .antd-version file."
        required: false

permissions:
  contents: write

jobs:
  release-meta:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Resolve version
        id: meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            version="${tag#v}"
          else
            if [[ -z "${INPUT_VERSION}" || "${INPUT_VERSION}" == "REPLACE-ME" ]]; then
              echo "::error::workflow_dispatch requires a version input (saw '${INPUT_VERSION}')"
              exit 1
            fi
            version="${INPUT_VERSION}"
          fi
          echo "version=${version}" >> $GITHUB_OUTPUT
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Event: ${GITHUB_EVENT_NAME}, Version: $version"

  resolve-antd-version:
    name: Resolve antd version
    runs-on: ubuntu-latest
    outputs:
      antd_tag: ${{ steps.resolve.outputs.antd_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Priority: workflow_dispatch input > .antd-version file > latest
          INPUT="${{ github.event.inputs.antd_version }}"

          if [ -n "$INPUT" ]; then
            TAG="$INPUT"
            echo "Source: workflow_dispatch input"
          elif [ -f .antd-version ]; then
            TAG=$(cat .antd-version | tr -d '[:space:]')
            echo "Source: .antd-version file"
          else
            TAG="latest"
            echo "Source: default (latest)"
          fi

          if [ "$TAG" = "latest" ]; then
            TAG=$(gh release list --repo WithAutonomi/ant-sdk --limit 1 --json tagName --jq '.[0].tagName')
            echo "Resolved 'latest' to: $TAG"
          fi

          echo "antd_tag=$TAG" >> $GITHUB_OUTPUT
          echo "Bundling antd daemon: $TAG"

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    needs: [release-meta, resolve-antd-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
            indelible_artifact: indelible-linux-amd64
            antd_artifact: antd-linux-amd64
          - goos: linux
            goarch: arm64
            os: ubuntu-latest
            indelible_artifact: indelible-linux-arm64
            antd_artifact: antd-linux-arm64
          - goos: darwin
            goarch: arm64
            os: macos-latest
            indelible_artifact: indelible-darwin-arm64
            antd_artifact: antd-darwin-arm64
          - goos: windows
            goarch: amd64
            os: windows-latest
            indelible_artifact: indelible-windows-amd64.exe
            antd_artifact: antd-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build indelible
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ needs.release-meta.outputs.version }}"
          go build -ldflags "-s -w -X github.com/WithAutonomi/indelible/internal/buildinfo.Version=${VERSION}" \
            -o "${{ matrix.indelible_artifact }}" ./cmd/indelible

      - name: Download antd daemon
        if: matrix.antd_artifact != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ANTD_TAG="${{ needs.resolve-antd-version.outputs.antd_tag }}"
          echo "Downloading ${{ matrix.antd_artifact }} from ant-sdk release ${ANTD_TAG}"
          gh release download "${ANTD_TAG}" \
            --repo WithAutonomi/ant-sdk \
            --pattern "${{ matrix.antd_artifact }}" \
            --dir . || echo "::warning::No antd binary found for ${{ matrix.antd_artifact }} — skipping bundle"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.indelible_artifact }}
          path: |
            ${{ matrix.indelible_artifact }}
            ${{ matrix.antd_artifact }}
          if-no-files-found: error

  release:
    name: Create Release
    if: github.event_name == 'push'
    needs: [build, release-meta, resolve-antd-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
          echo "Release artifacts:"
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ needs.release-meta.outputs.prerelease == 'true' }}
          body: |
            Bundled antd daemon: `${{ needs.resolve-antd-version.outputs.antd_tag }}`

  docker:
    name: Docker (multi-arch build + push)
    needs: [release-meta]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push indelible (linux/amd64,linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.release-meta.outputs.version }}
          tags: |
            ghcr.io/withautonomi/indelible:${{ needs.release-meta.outputs.version }}
            withautonomi/indelible:${{ needs.release-meta.outputs.version }}
            ${{ github.event_name == 'push' && needs.release-meta.outputs.prerelease == 'false' && 'ghcr.io/withautonomi/indelible:latest' || '' }}
            ${{ github.event_name == 'push' && needs.release-meta.outputs.prerelease == 'false' && 'withautonomi/indelible:latest' || '' }}
          cache-from: type=gha,scope=docker-release
          cache-to: type=gha,scope=docker-release,mode=max
