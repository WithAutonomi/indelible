name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # web/embed.go declares //go:embed all:dist — Go won't compile without dist/
      - name: Stub frontend dist
        run: mkdir -p web/dist && echo '<!doctype html>' > web/dist/index.html

      - name: Go vet
        run: go vet ./...

      - name: Verify module checksums
        run: go mod verify

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Stub frontend dist
        run: mkdir -p web/dist && echo '<!doctype html>' > web/dist/index.html

      - name: Run tests
        run: go test -race -count=1 -timeout 5m ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Type check and build
        run: cd web && npm run build
