name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      antd_version:
        description: "ant-sdk release tag to bundle (e.g. v0.2.0). Leave empty to read .antd-version file."
        required: false

permissions:
  contents: write

jobs:
  release-meta:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Parse tag
        id: meta
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          echo "version=${version}" >> $GITHUB_OUTPUT
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Tag: $tag, Version: $version, Prerelease: $(grep prerelease $GITHUB_OUTPUT | tail -1 | cut -d= -f2)"

  resolve-antd-version:
    name: Resolve antd version
    runs-on: ubuntu-latest
    outputs:
      antd_tag: ${{ steps.resolve.outputs.antd_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Priority: workflow_dispatch input > .antd-version file > latest
          INPUT="${{ github.event.inputs.antd_version }}"

          if [ -n "$INPUT" ]; then
            TAG="$INPUT"
            echo "Source: workflow_dispatch input"
          elif [ -f .antd-version ]; then
            TAG=$(cat .antd-version | tr -d '[:space:]')
            echo "Source: .antd-version file"
          else
            TAG="latest"
            echo "Source: default (latest)"
          fi

          if [ "$TAG" = "latest" ]; then
            TAG=$(gh release list --repo WithAutonomi/ant-sdk --limit 1 --json tagName --jq '.[0].tagName')
            echo "Resolved 'latest' to: $TAG"
          fi

          echo "antd_tag=$TAG" >> $GITHUB_OUTPUT
          echo "Bundling antd daemon: $TAG"

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    needs: [release-meta, resolve-antd-version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            os: ubuntu-latest
            indelible_artifact: indelible-linux-amd64
            antd_artifact: antd-linux-amd64
          - goos: linux
            goarch: arm64
            os: ubuntu-latest
            indelible_artifact: indelible-linux-arm64
            antd_artifact: antd-linux-arm64
          - goos: darwin
            goarch: arm64
            os: macos-latest
            indelible_artifact: indelible-darwin-arm64
            antd_artifact: antd-darwin-arm64
          - goos: windows
            goarch: amd64
            os: windows-latest
            indelible_artifact: indelible-windows-amd64.exe
            antd_artifact: antd-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: cd web && npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build indelible
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ needs.release-meta.outputs.version }}"
          go build -ldflags "-s -w -X github.com/WithAutonomi/indelible/internal/buildinfo.Version=${VERSION}" \
            -o "${{ matrix.indelible_artifact }}" ./cmd/indelible

      - name: Download antd daemon
        if: matrix.antd_artifact != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ANTD_TAG="${{ needs.resolve-antd-version.outputs.antd_tag }}"
          echo "Downloading ${{ matrix.antd_artifact }} from ant-sdk release ${ANTD_TAG}"
          gh release download "${ANTD_TAG}" \
            --repo WithAutonomi/ant-sdk \
            --pattern "${{ matrix.antd_artifact }}" \
            --dir . || echo "::warning::No antd binary found for ${{ matrix.antd_artifact }} — skipping bundle"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.indelible_artifact }}
          path: |
            ${{ matrix.indelible_artifact }}
            ${{ matrix.antd_artifact }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: [build, release-meta, resolve-antd-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
          echo "Release artifacts:"
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ needs.release-meta.outputs.prerelease == 'true' }}
          body: |
            Bundled antd daemon: `${{ needs.resolve-antd-version.outputs.antd_tag }}`

  # Multi-arch Docker images. The build runs on every tag and validates the
  # cross-compile; the push step is gated off until V2-298 lands the Docker Hub
  # org + GHCR setup + credentials. Once V2-298 flips `push: true` and adds the
  # login steps, this job becomes the actual release-publish path.
  docker:
    name: Docker (multi-arch build, push gated by V2-298)
    needs: [release-meta, resolve-antd-version]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # V2-298: uncomment the two login steps below and flip both build-push
      # actions' `push:` to `true` once DOCKERHUB_USERNAME + DOCKERHUB_TOKEN
      # secrets are configured.
      #
      # - name: Log in to GHCR
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      #
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build indelible (linux/amd64,linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false # V2-298 flips to true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.release-meta.outputs.version }}
          tags: |
            ghcr.io/withautonomi/indelible:${{ needs.release-meta.outputs.version }}
            ghcr.io/withautonomi/indelible:latest
            withautonomi/indelible:${{ needs.release-meta.outputs.version }}
            withautonomi/indelible:latest
          cache-from: type=gha,scope=docker-release
          cache-to: type=gha,scope=docker-release,mode=max

      - name: Build antd companion (linux/amd64 — arm64 blocked on V2-275)
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/antd
          push: false # V2-298 flips to true
          platforms: linux/amd64
          build-args: |
            ANTD_VERSION=${{ needs.resolve-antd-version.outputs.antd_tag }}
          tags: |
            ghcr.io/withautonomi/antd:${{ needs.resolve-antd-version.outputs.antd_tag }}
            ghcr.io/withautonomi/antd:latest
            withautonomi/antd:${{ needs.resolve-antd-version.outputs.antd_tag }}
            withautonomi/antd:latest
          cache-from: type=gha,scope=docker-release-antd
          cache-to: type=gha,scope=docker-release-antd,mode=max
