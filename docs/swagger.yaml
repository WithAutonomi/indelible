basePath: /api/v2
definitions:
  github_com_WithAutonomi_indelible_internal_services.AuditChainResult:
    properties:
      anchor_address:
        description: network address of the latest anchor
        type: string
      anchor_checked:
        description: |-
          Anchor fields describe how the chain relates to the most recent Autonomi
          anchor (V2-453). AnchorChecked is false when no anchor has been recorded.
        type: boolean
      anchor_matches:
        description: recomputed head at the anchored row_count equals the anchored
          head
        type: boolean
      anchored_at:
        type: string
      broken_at:
        description: id of the first row that fails (0 when intact)
        type: integer
      count:
        description: number of chained rows checked
        type: integer
      intact:
        type: boolean
    type: object
  github_com_WithAutonomi_indelible_internal_services.ComponentVersion:
    properties:
      checked:
        description: false if GitHub couldn't be reached
        type: boolean
      current:
        description: running version ("" if unknown)
        type: string
      latest:
        description: latest release tag ("" if not checked)
        type: string
      release_url:
        description: link to the latest release
        type: string
      update_available:
        description: latest is newer than current
        type: boolean
    type: object
  github_com_WithAutonomi_indelible_internal_services.DayCount:
    properties:
      count:
        type: integer
      date:
        description: YYYY-MM-DD
        type: string
    type: object
  github_com_WithAutonomi_indelible_internal_services.ImportResult:
    properties:
      errors:
        items:
          type: string
        type: array
      imported:
        type: integer
      owner_fallback:
        description: owner email unmatched → assigned to importer
        type: integer
      skipped:
        description: uuid already present on target
        type: integer
    type: object
  github_com_WithAutonomi_indelible_internal_services.LogStats:
    properties:
      by_component:
        additionalProperties:
          format: int64
          type: integer
        description: system_log (top 10)
        type: object
      by_day:
        description: last 30 days, ascending
        items:
          $ref: '#/definitions/github_com_WithAutonomi_indelible_internal_services.DayCount'
        type: array
      by_event_type:
        additionalProperties:
          format: int64
          type: integer
        description: audit_log (top 10)
        type: object
      by_level:
        additionalProperties:
          format: int64
          type: integer
        description: system_log
        type: object
      by_setting_key:
        additionalProperties:
          format: int64
          type: integer
        description: config_audit (top 10)
        type: object
      by_severity:
        additionalProperties:
          format: int64
          type: integer
        description: One of these will be populated depending on the log type.
        type: object
      disk_usage_bytes:
        description: |-
          DiskUsageBytes is 0 when the dialect doesn't expose a per-table size
          (SQLite has no straightforward way to break a whole-DB file down per
          table). On Postgres it's pg_total_relation_size for the underlying table.
        type: integer
      earliest:
        type: string
      latest:
        type: string
      total_entries:
        type: integer
    type: object
  github_com_WithAutonomi_indelible_internal_services.SearchHit:
    properties:
      id:
        type: string
      label:
        type: string
      sublabel:
        type: string
      type:
        type: string
    type: object
  github_com_WithAutonomi_indelible_internal_services.VersionCheckResult:
    properties:
      antd:
        $ref: '#/definitions/github_com_WithAutonomi_indelible_internal_services.ComponentVersion'
      github_reachable:
        type: boolean
      indelible:
        $ref: '#/definitions/github_com_WithAutonomi_indelible_internal_services.ComponentVersion'
    type: object
  internal_handlers.StorageInfo:
    properties:
      available:
        description: false when disk figures couldn't be read
        type: boolean
      data_dir:
        description: configured data directory path
        type: string
      free_bytes:
        description: bytes free on that filesystem
        type: integer
      quota:
        allOf:
        - $ref: '#/definitions/internal_handlers.StorageQuota'
        description: present only when a system storage quota is set
      total_bytes:
        description: capacity of the backing filesystem
        type: integer
      used_bytes:
        description: bytes in use on that filesystem
        type: integer
      used_pct:
        description: used / total * 100
        type: number
      volume:
        description: drive letter on Windows (e.g. "C:"), empty on Unix
