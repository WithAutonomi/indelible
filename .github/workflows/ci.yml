name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

# Cancel in-flight PR runs when a new push lands on the same PR — force-push
# rebases used to leave the prior run racing to completion, burning minutes
# we can't use. Master pushes never cancel (each commit needs full coverage
# for the post-merge race/docker/security signals).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # web/embed.go declares //go:embed all:dist — Go won't compile without dist/
      - name: Stub frontend dist
        run: mkdir -p web/dist && echo '<!doctype html>' > web/dist/index.html

      - name: Go vet
        run: go vet ./...

      - name: Verify module checksums
        run: go mod verify

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: golangci-lint
        run: golangci-lint run ./...

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.6

      - name: Check Swagger docs are up to date
        run: |
          swag init -g cmd/indelible/main.go -o docs/ --parseDependency
          git diff --exit-code docs/ || (echo "Swagger docs are out of date — run 'swag init -g cmd/indelible/main.go -o docs/ --parseDependency' and commit" && exit 1)

  test:
    name: Test (${{ matrix.db }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, postgres]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Stub frontend dist
        run: mkdir -p web/dist && echo '<!doctype html>' > web/dist/index.html

      - name: Run tests
        env:
          INDELIBLE_TEST_DB_URL: ${{ matrix.db == 'postgres' && 'postgres://postgres:ci@localhost:5432/postgres?sslmode=disable' || '' }}
        run: go test -count=1 -timeout 5m ./...

  # Race detection is master-only — runs after a PR merges to catch races we
  # can't afford to run on every push. Local pre-push checks (scripts/ci-local.sh
  # for simple cases, scripts/ci-dev1.sh for the full matrix) are how
  # branch-level coverage happens.
  race:
    name: Race detection (${{ matrix.db }})
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, postgres]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Stub frontend dist
        run: mkdir -p web/dist && echo '<!doctype html>' > web/dist/index.html

      - name: Run tests with race detector
        env:
          INDELIBLE_TEST_DB_URL: ${{ matrix.db == 'postgres' && 'postgres://postgres:ci@localhost:5432/postgres?sslmode=disable' || '' }}
        run: go test -race -count=1 -timeout 15m ./...

  # Security scanning is master-only — supply-chain results (govulncheck +
  # npm audit) don't typically change PR-by-PR, and the scanners hit external
  # registries which is also a bandwidth/rate-limit hazard if we run them
  # every push. Use `make security` locally if you need a check before pushing.
  # Hard-fails on hit (was continue-on-error: true while private — see V2-344
  # for the rationale and the precondition-check that confirmed master was
  # green under hard-fail at flip time).
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Stub frontend dist
        run: mkdir -p web/dist && echo '<!doctype html>' > web/dist/index.html

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Go vulnerability scan
        run: govulncheck ./...

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend deps
        run: cd web && npm ci

      - name: NPM audit
        run: cd web && npm audit --audit-level=high

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Type check and build
        run: cd web && npm run build

      - name: Unit tests
        run: cd web && npm run test:unit

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 1

  # Validates the Dockerfile + .dockerignore + buildx cross-compile path on
  # every PR and push. Builds amd64 locally for a smoke test
  # (start → /health → uid 65532) and also runs the multi-arch (amd64+arm64)
  # build without loading, just to confirm the arm64 cross-compile still
  # succeeds. No image is pushed here — publishing is handled in release.yml.
  docker:
    name: Docker (build + smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build indelible image (amd64, load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: indelible:ci
          platforms: linux/amd64
          build-args: |
            VERSION=ci
          cache-from: type=gha,scope=docker-ci
          cache-to: type=gha,scope=docker-ci,mode=max

      - name: Smoke test — container starts, /health responds, runs as non-root
        run: |
          set -euo pipefail
          JWT_SECRET=$(openssl rand -hex 32)
          WALLET_KEY=$(openssl rand -hex 32)
          # External mode: don't let the smoke container spawn antd and try to
          # bootstrap mainnet from the runner. The bundled binary is asserted
          # separately below.
          docker run --rm -d \
            --name indelible-smoke \
            -p 8080:8080 \
            -e INDELIBLE_JWT_SECRET="$JWT_SECRET" \
            -e INDELIBLE_WALLET_ENCRYPTION_KEY="$WALLET_KEY" \
            -e INDELIBLE_ANTD_MANAGED=false \
            -e INDELIBLE_ADMIN_EMAIL=smoke@example.com \
            -e INDELIBLE_ADMIN_PASSWORD=smoke-admin-password \
            indelible:ci
          trap 'docker logs indelible-smoke || true; docker stop indelible-smoke || true' EXIT
          for i in $(seq 1 30); do
            status=$(docker inspect -f '{{.State.Health.Status}}' indelible-smoke 2>/dev/null || echo starting)
            if [ "$status" = "healthy" ]; then
              echo "container healthy after ${i} attempts"
              break
            fi
            if [ "$status" = "unhealthy" ]; then
              echo "container went unhealthy" >&2; exit 1
            fi
            sleep 2
          done
          curl -fsS http://localhost:8080/health
          uid=$(docker exec indelible-smoke id -u)
          if [ "$uid" != "65532" ]; then
            echo "expected uid 65532 (non-root indelible), got $uid" >&2
            exit 1
          fi
          echo "non-root verified (uid=$uid)"
          # The antd daemon must ship inside the image (regression guard): the
          # product is non-functional without it, and managed mode / bare
          # `docker run` rely on it being in PATH and executable. `--help`
          # exits 0 and actually runs the binary, so this also catches an
          # arch/libc mismatch in the bundled daemon.
          docker exec indelible-smoke antd --help >/dev/null
          echo "bundled antd present and executable"

      - name: Verify multi-arch build (linux/amd64 + linux/arm64, no load/push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: indelible:multi
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=ci-multiarch
          cache-from: type=gha,scope=docker-ci

  # Browser-level smoke suite — verifies server boots, frontend renders,
  # auth/admin round-trips work via Playwright. Despite the directory living
  # under smoke/, the SSO Dex round-trip on PR #34 (when it merges) is a
  # genuine end-to-end test and stays here too because Dex is cheap to set
  # up in CI. Real upload-and-retrieve E2E (requires antd + wallet + devnet)
  # lives under e2e/ and runs only via scripts/ci-dev1.sh, not in CI.
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    needs: [test, frontend]
    steps:
      - uses: actions/checkout@v4

      # Download real frontend dist (not the stub — the binary embeds it via //go:embed)
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify frontend dist
        run: |
          echo "=== dist contents ==="
          ls -la web/dist/
          ls -la web/dist/assets/ || echo "no assets dir"
          echo "=== index.html head ==="
          head -5 web/dist/index.html

      # Build binary here so it embeds the real frontend, not a stub
      - name: Build server
        run: go build -o bin/indelible-test ./cmd/indelible

      - name: Smoke test server
        run: |
          export INDELIBLE_DB_URL="sqlite://:memory:"
          export INDELIBLE_JWT_SECRET="smoke-ci-test-secret-minimum-32-characters"
          export INDELIBLE_WALLET_ENCRYPTION_KEY="aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaab"
          export INDELIBLE_DATA_DIR="/tmp/indelible-smoke"
          export INDELIBLE_ADMIN_EMAIL="smoke@example.com"
          export INDELIBLE_ADMIN_PASSWORD="smoke-admin-password"
          bin/indelible-test &
          SERVER_PID=$!
          sleep 2
          echo "=== health check ==="
          curl -s http://localhost:8080/health || echo "health failed"
          echo ""
          echo "=== GET /register (first 20 lines) ==="
          curl -s http://localhost:8080/register | head -20
          echo ""
          echo "=== GET / (first 20 lines) ==="
          curl -s http://localhost:8080/ | head -20
          kill $SERVER_PID 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: smoke/package-lock.json

      - name: Install Playwright
        run: cd smoke && npm ci && npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: cd smoke && npx playwright test
        env:
          INDELIBLE_DB_URL: "sqlite://:memory:"
          INDELIBLE_JWT_SECRET: smoke-ci-test-secret-minimum-32-characters
          INDELIBLE_WALLET_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaab
          INDELIBLE_DATA_DIR: /tmp/indelible-smoke
          # Seed the admin the Playwright globalSetup logs in as (ADMIN_CREDS).
          INDELIBLE_ADMIN_EMAIL: admin@e2e-test.com
          INDELIBLE_ADMIN_PASSWORD: TestPassword123!

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: smoke/playwright-report/
          retention-days: 7
